<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Phishing Guard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-shield-alt"></i>
                    <h1>PhishGuard AI</h1>
                </div>
                <p class="tagline">Advanced DistilBERT-Powered Phishing Detection</p>
            </div>
        </header>

        <main class="main-content">
            <div class="input-section">
                <label for="emailInput">
                    <i class="fas fa-envelope"></i> 
                    Paste Email Content to Analyze
                </label>
                <textarea id="emailInput" 
                          placeholder="Paste the full email body, subject, or suspicious content here..."></textarea>
            </div>
            
            <button id="scanBtn" onclick="sendToClassifier()">
                <i class="fas fa-bolt"></i> 
                <span>Scan with AI</span>
            </button>

            <div id="resultsCard" class="results-card hidden">
                <div class="verdict-header">
                    <h2>Verdict: <span id="verdictText" class="verdict-value">--</span></h2>
                    <div id="verdictIcon" class="verdict-icon"></div>
                </div>
                
                <div class="probability-container">
                    <div class="prob-bar">
                        <div class="label">
                            <span class="danger">Phishing</span>
                            <span id="phishBar" class="value">0%</span>
                        </div>
                        <div class="bar-bg">
                            <div id="phishProgress" class="progress-bar danger-bar"></div>
                        </div>
                    </div>
                    
                    <div class="prob-bar">
                        <div class="label">
                            <span class="safe">Safe</span>
                            <span id="safeBar" class="value">0%</span>
                        </div>
                        <div class="bar-bg">
                            <div id="safeProgress" class="progress-bar safe-bar"></div>
                        </div>
                    </div>
                </div>
                
                <button id="resetBtn" onclick="resetAnalysis()" class="reset-btn">
                    <i class="fas fa-redo"></i> Analyze Another Email
                </button>
            </div>
        </main>

        <footer>
            <p>DEPI Graduation Project • Powered by DistilBERT</p>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
